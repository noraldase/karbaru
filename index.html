<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Maintenance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
            color: white;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .text {
            font-size: 32px;
            font-style: italic;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #0088cc;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #0077b5;
        }

        .telegram-icon {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚧</div>
        <div class="text">SEDANG MAINTENANCE</div>

        <a href="https://t.me/AgenNeoParty" class="btn" target="_blank">
            <img class="telegram-icon" 
            src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" 
            alt="Telegram">
            Chat Admin
        </a>
    </div>
</body>
</html>
